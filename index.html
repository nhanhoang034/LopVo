<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Lớp Võ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <h2>Danh Sách Tạo Bởi Nhân Hoàng</h2>
    <p style="font-weight: bold; font-size: 1.2em; color: #ff0000;">Quyền = 9 - Cấp</p>

    <div class="filter-container">
        <div class="filter-row">
            <label for="searchInput">Tìm kiếm:</label>
            <input type="text" id="searchInput" placeholder="Tên hoặc mã hội viên ...">
        </div>

        <div class="filter-row">
            <label for="roleFilter">Cấp:</label>
            <select id="roleFilter">
                <option value="">Tất cả cấp</option>
            </select>
        </div>

        <div class="filter-row">
            <label for="genderFilter">Giới tính:</label>
            <select id="genderFilter">
                <option value="">Tất cả</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
            </select>
        </div>

        <div class="filter-row">
            <label for="yearFilter">Năm sinh:</label>
            <select id="yearFilter">
                <option value="">Tất cả năm</option>
            </select>
        </div>
    </div>

    <div class="info-bar" style="display: flex; justify-content: space-between; width: 100%; max-width: 1000px; align-items: center; margin-bottom: 10px;">
        <span id="totalCount">Hiện có: 0 học viên</span>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span id="selectedCount" style="color: #0088cc; font-weight: bold;">Đã chọn: 0 học viên</span>
            <button id="resetBtn" title="Xóa toàn bộ dấu tick đang chọn" style="padding: 6px 10px; font-size: 15px; background-color: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
                🔄 Reset
            </button>
            <button id="exportBtn" style="padding: 6px 12px; font-size: 16px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
                💚 Xuất Excel
            </button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Họ và Tên</th>
                <th>Mã Hội Viên</th>
                <th>Copy</th>
                <th style="width: 50px;">Chọn</th> <th>Ngày Sinh</th>
                <th>Giới Tính</th>
                <th>Quyền</th> <th>Cấp</th>   </tr>
        </thead>
        <tbody id="memberTable"></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
