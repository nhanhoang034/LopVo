<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Tháng</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <div id="lockScreen" style="position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h3 style="font-family:'Times New Roman', Times, serif;">HỆ THỐNG ĐÃ BỊ KHÓA</h3>
        <p style="font-size:16px; color:#555;">Hãy nhập mật khẩu.</p>
        <div style="display:flex; gap:10px; width:100%; max-width:320px;">
            <input type="password" id="webPasswordInput" placeholder="Nhập mật khẩu..." style="padding:10px; font-size:16px;">
            <button id="unlockBtn" style="padding:10px 15px; font-size:16px; background:#34495e; color:#fff; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">Mở Khóa</button>
        </div>
    </div>

    <div class="nav-tabs" style="display: flex; gap: 10px; margin: 10px 0 20px 0; width: 100%; max-width: 1000px; justify-content: center;">
        <a href="index.html" style="padding: 10px 20px; background-color: #bdc3c7; color: #333; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 16px;">
            Danh Sách Thi Quý
        </a>
        <a href="index_DSThang.html" style="padding: 10px 20px; background-color: #34495e; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 16px;">
            Danh Sách Tháng
        </a>
    </div>

    <h2>Danh Sách Tạo Bởi Nhân Hoàng</h2>
    <p style="color: #555; margin-bottom: 20px; font-size: 16px;">Tải danh sách Excel lên</p>

    <div style="margin-bottom: 30px; background: #f8f9fa; padding: 20px; border: 2px dashed #ccc; border-radius: 8px; width: 100%; max-width: 600px; box-sizing: border-box;">
        <input type="file" id="excelFileInput" accept=".xlsx, .xls" style="font-size: 16px; cursor: pointer;">
    </div>

    <div class="main-container" style="display: flex; gap: 30px; width: 100%; max-width: 1300px; align-items: flex-start; box-sizing: border-box; padding: 0 10px;">
        <div style="flex: 1; min-width: 300px; background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); max-height: 75vh; overflow-y: auto;">
            <h3 style="margin-top: 0; margin-bottom: 15px; border-bottom: 2px solid #34495e; padding-bottom: 5px; text-align: left; font-size: 18px;">File Excel Gốc</h3>
            <div id="excelPreviewContainer">
                <p style="color: #999; font-size: 15px;">Chưa có dữ liệu. Vui lòng tải file Excel lên.</p>
            </div>
        </div>

        <div style="flex: 1.2; min-width: 350px; display: flex; flex-direction: column; gap: 15px; max-height: 75vh; overflow-y: auto; padding-right: 5px;">
            <h3 style="margin-top: 0; margin-bottom: 0; border-bottom: 2px solid #27ae60; padding-bottom: 5px; text-align: left; font-size: 18px;">Kết Quả Copy Nhóm 13 Tên</h3>
            <div id="resultContainer" style="display: flex; flex-direction: column; gap: 15px; width: 100%;"></div>
        </div>
    </div>

    <script src="script_DSThang.js"></script>
</body>
</html>
